<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta http-equiv="Expires" content="0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>PlayCat</title>
    <script type="module" crossorigin src="/assets/index.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index.css">
  </head>
  <body>
    <div id="app-boot-splash" aria-hidden="true">
      <img src="/splash-logo.png" alt="PlayCat" class="app-boot-splash__logo" />
    </div>
    <div id="root"></div>
    <script>
      (function () {
        var reloadKey = "adultapp:asset-reload-once";

        function reloadToLatest() {
          try {
            var url = new URL(window.location.href);
            url.searchParams.set("v", String(Date.now()));
            window.location.replace(url.toString());
          } catch (error) {
            window.location.reload();
          }
        }

        function clearCachesThenReload() {
          if (!("caches" in window)) {
            reloadToLatest();
            return;
          }

          caches.keys()
            .then(function (keys) {
              return Promise.all(keys.map(function (key) { return caches.delete(key); }));
            })
            .catch(function () {
              return null;
            })
            .finally(reloadToLatest);
        }

        window.addEventListener(
          "error",
          function (event) {
            var target = event && event.target;
            if (!(target instanceof HTMLScriptElement)) return;
            if (target.type !== "module") return;
            if (window.sessionStorage.getItem(reloadKey) === "1") return;

            window.sessionStorage.setItem(reloadKey, "1");
            clearCachesThenReload();
          },
          true
        );

        window.addEventListener(
          "load",
          function () {
            window.sessionStorage.removeItem(reloadKey);
          },
          { once: true }
        );
      })();
    </script>
  </body>
</html>
